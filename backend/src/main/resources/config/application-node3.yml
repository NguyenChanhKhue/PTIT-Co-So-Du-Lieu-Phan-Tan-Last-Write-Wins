server:
  port: 8083

node:
  id: 3
  url: http://localhost:8083

cluster:
  peers: http://localhost:8081,http://localhost:8082
  replication-token: dev-replication-token

# CLOCK SKEW: -15 seconds (SLOWER than real time)
# This node's clock is 15 seconds behind
clock:
  skew-seconds: -15

spring:
  datasource:
    url: jdbc:sqlite:data/customer-node3.db

logging:
  level:
    com.example.distributed_last_write_wins: INFO
